name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t immich-exporter-test .

      - name: Smoke test
        run: |
          docker run --rm --entrypoint python immich-exporter-test -c \
            "from immich_exporter.exporter import main; print('All imports OK')"
