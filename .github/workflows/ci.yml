name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t immich-exporter-test .

      - name: Smoke test
        run: |
          output=$(docker run --rm immich-exporter-test 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "No host specified"
